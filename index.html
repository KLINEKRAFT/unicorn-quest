<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Unicorn Quest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Mobile D-pad -->
  <div id="controls" aria-label="controls">
    <button class="btn" id="btnUp" aria-label="up">▲</button>
    <div class="row">
      <button class="btn" id="btnLeft" aria-label="left">◀</button>
      <button class="btn" id="btnDown" aria-label="down">▼</button>
      <button class="btn" id="btnRight" aria-label="right">▶</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
